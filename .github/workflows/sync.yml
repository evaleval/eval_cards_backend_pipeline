name: Sync Pipeline

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "metadata/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/sync.yml"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install python dependencies
        run: python -m pip install --upgrade pip huggingface_hub

      - name: Download EEE dataset snapshot
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          EEE_LOCAL_DATASET_DIR: .cache/eee_datastore
        run: python scripts/fetch_eee_dataset.py

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Free npm cache
        run: npm cache clean --force

      - name: Run pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CONFIG_BATCH_SIZE: "3"
          EEE_LOCAL_DATASET_DIR: .cache/eee_datastore
        run: node scripts/pipeline.mjs

      - name: Upload manifest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-manifest
          path: output/manifest.json
